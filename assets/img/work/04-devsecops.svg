<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000" role="img">
  <style>
    text { -webkit-font-smoothing:antialiased; }
    .spin { transform-box:fill-box; transform-origin:center; animation:spin 22s linear infinite; }
    .spinr { transform-box:fill-box; transform-origin:center; animation:spin 30s linear infinite reverse; }
    .pulse { animation:pulse 3.4s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
    .flow { stroke-dasharray:10 14; animation:flow 2.6s linear infinite; }
    .flowS { stroke-dasharray:4 10; animation:flow 1.8s linear infinite; }
    .twinkle { animation:twinkle 3s ease-in-out infinite; }
    .sweep { transform-box:fill-box; transform-origin:center; animation:spin 6s linear infinite; }
    .draw { stroke-dasharray:1600; stroke-dashoffset:1600; animation:draw 4s ease-in-out infinite alternate; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100%{ opacity:.35; transform:scale(.94);} 50%{ opacity:1; transform:scale(1.06);} }
    @keyframes flow { to { stroke-dashoffset:-48; } }
    @keyframes twinkle { 0%,100%{opacity:.25;} 50%{opacity:1;} }
    @keyframes draw { to { stroke-dashoffset:0; } }
    
  </style>
